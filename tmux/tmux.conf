# ===============================
# TMUX CONFIG – Sway-style Setup
# ===============================

# --- 1. Window / workspace numbering starts at 1 ---
set -g base-index 1
set -g pane-base-index 1

# --- 2. Pane navigation: Alt+hjkl ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- 3. Workspace switching: Alt+u/i/o/p (by index) ---
bind -n M-u run-shell "tmux select-window -t 1 2>/dev/null || tmux new-window -t 1"
bind -n M-i run-shell "tmux select-window -t 2 2>/dev/null || tmux new-window -t 2"
bind -n M-o run-shell "tmux select-window -t 3 2>/dev/null || tmux new-window -t 3"
bind -n M-p run-shell "tmux select-window -t 4 2>/dev/null || tmux new-window -t 4"

# --- 4. Resize mode: Alt+r ---
bind -n M-r switch-client -T resize-mode
bind -T resize-mode h resize-pane -L 5
bind -T resize-mode j resize-pane -D 5
bind -T resize-mode k resize-pane -U 5
bind -T resize-mode l resize-pane -R 5
bind -T resize-mode M-r switch-client -T root
bind -T resize-mode Escape switch-client -T root

# --- 5. Move pane: Alt+Shift+H/J/K/L ---
# tmux cannot move in exact direction, swaps with previous/next pane
bind -n M-H swap-pane -U
bind -n M-J swap-pane -D
bind -n M-K swap-pane -U
bind -n M-L swap-pane -D

# --- 6. Kill pane without confirmation ---
bind -n M-Q kill-pane

# --- 7. Active pane background ---
set -g window-style "bg=black"
set -g window-active-style "bg=#111111"

# --- 8. New panes: Alt+n / Alt+m ---
bind -n M-m split-window -h  # vertical split (side by side)
bind -n M-n split-window -v  # horizontal split (top/bottom)

# --- 9. Move pane to workspace: Alt+Shift+u/i/o/p ---
bind -n M-U run-shell "tmux move-pane -t 1 2>/dev/null || (tmux new-window -t 1; tmux move-pane -t 1)"
bind -n M-I run-shell "tmux move-pane -t 2 2>/dev/null || (tmux new-window -t 2; tmux move-pane -t 2)"
bind -n M-O run-shell "tmux move-pane -t 3 2>/dev/null || (tmux new-window -t 3; tmux move-pane -t 3)"
bind -n M-P run-shell "tmux move-pane -t 4 2>/dev/null || (tmux new-window -t 4; tmux move-pane -t 4)"

# --- 10. Status bar highlighting for active workspace ---
set -g status on
set -g status-bg black
set -g status-fg white
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bg=#333333]#[fg=white] #I:#W #[default] "
